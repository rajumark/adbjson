name: Build and Release

on:
  push:
    branches: [ main, develop ]
  

permissions:
  contents: write

jobs:
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Check commit message for #go
      id: check
      run: |
        if [[ "${{ github.event_name }}" == "release" ]]; then
          echo "should-build=true" >> $GITHUB_OUTPUT
        else
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          if [[ "$COMMIT_MSG" == *"#go"* ]]; then
            echo "should-build=true" >> $GITHUB_OUTPUT
          else
            echo "should-build=false" >> $GITHUB_OUTPUT
          fi
        fi

  build:
    needs: check-commit
    if: needs.check-commit.outputs.should-build == 'true'
    strategy:
      matrix:
        # os: [ubuntu-latest, macos-latest, windows-latest]  # TODO: Uncomment for multi-platform builds
        os: [ubuntu-latest]  # Ubuntu-only for now
        go-version: ['1.21']
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    
    - name: Download platform-tools
      run: |
        mkdir -p platform-tools
        if [ "$RUNNER_OS" == "Linux" ]; then
          curl -L -o platform-tools.zip https://dl.google.com/android/repository/platform-tools-latest-linux.zip
          unzip -q platform-tools.zip -d platform-tools
          mv platform-tools/platform-tools platform-tools/platform-tools-linux
        # elif [ "$RUNNER_OS" == "macOS" ]; then  # TODO: Uncomment for macOS builds
        #   curl -L -o platform-tools.zip https://dl.google.com/android/repository/platform-tools-latest-darwin.zip
        #   unzip -q platform-tools.zip -d platform-tools
        #   mv platform-tools/platform-tools platform-tools/platform-tools-darwin
        # else  # TODO: Uncomment for Windows builds
        #   curl -L -o platform-tools.zip https://dl.google.com/android/repository/platform-tools-latest-windows.zip
        #   unzip -q platform-tools.zip -d platform-tools
        #   mv platform-tools/platform-tools platform-tools/platform-tools-windows
        fi
        rm platform-tools.zip
      shell: bash
    
    - name: Download Go dependencies
      run: go mod download
    
    - name: Verify dependencies
      run: go mod verify
    
    - name: Build
      run: |
        # Get version from git or use default
        VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        
        # Build with optimization flags
        # if [ "$RUNNER_OS" == "macOS" ]; then  # TODO: Uncomment for macOS builds
        #   GOARCH=amd64 go build -ldflags="-s -w" -v -o adbjson
        # else  # TODO: Uncomment for Windows builds
          go build -ldflags="-s -w" -v -o adbjson${{ matrix.os == 'windows-latest' && '.exe' || '' }}
        # fi
        
        # Verify binary was created
        ls -la adbjson${{ matrix.os == 'windows-latest' && '.exe' || '' }} || echo "Binary not found!"
      shell: bash
    
    - name: Test (if Go is available)
      run: go test -v ./... || echo "No tests yet"
      continue-on-error: true
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: adbjson-${{ matrix.os }}
        path: |
          adbjson
          platform-tools/
        if-no-files-found: error
    
  release:
    needs: [check-commit, build]
    if: needs.check-commit.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create release archives
      run: |
        cd artifacts
        # Get version from tag step or use default
        VERSION="${{ env.NEW_VERSION || 'v0.1.0' }}"
        echo "Building version: $VERSION"
        
        # Create checksums file
        echo "# adbjson $VERSION Checksums" > checksums.txt
        
        # Process each artifact directory
        for dir in adbjson-*; do
          echo "=== Processing: $dir ==="
          ls -la "$dir" || echo "Directory listing failed"
          
          # Verify adbjson binary exists
          if [ ! -f "$dir/adbjson" ]; then
            echo "ERROR: adbjson binary not found in $dir"
            continue
          fi
          
          # Set executable permissions
          chmod +x "$dir/adbjson" || echo "chmod adbjson failed"
          chmod +x "$dir/platform-tools/platform-tools-linux/adb" || echo "chmod adb failed"
          
          # Determine platform
          if [[ "$dir" == *"ubuntu"* ]]; then
            PLATFORM="linux"
            ARCH="amd64"
            EXT="tar.gz"
          elif [[ "$dir" == *"macos"* ]]; then
            PLATFORM="darwin" 
            ARCH="amd64"
            EXT="tar.gz"
          else
            echo "Unknown platform in directory: $dir"
            continue
          fi
          
          # Create archive with proper naming
          ARCHIVE_NAME="adbjson_${VERSION}_${PLATFORM}_${ARCH}.${EXT}"
          echo "Creating archive: $ARCHIVE_NAME"
          
          # Verify both files exist before creating archive
          if [ ! -f "$dir/adbjson" ] || [ ! -d "$dir/platform-tools" ]; then
            echo "ERROR: Required files not found in $dir"
            ls -la "$dir"
            continue
          fi
          
          tar -czf "$ARCHIVE_NAME" -C "$dir" adbjson platform-tools/ || echo "tar creation failed"
          
          # Verify archive was created
          if [ ! -f "$ARCHIVE_NAME" ]; then
            echo "ERROR: Archive $ARCHIVE_NAME was not created"
            continue
          fi
          
          echo "Archive created successfully: $ARCHIVE_NAME"
          tar -tzf "$ARCHIVE_NAME" | head -5
          
          # Generate checksum
          if [ -f "$ARCHIVE_NAME" ]; then
            CHECKSUM=$(sha256sum "$ARCHIVE_NAME" | cut -d' ' -f1)
            echo "$CHECKSUM  $ARCHIVE_NAME" >> checksums.txt
            echo "Added checksum for $ARCHIVE_NAME"
          else
            echo "Archive $ARCHIVE_NAME was not created"
          fi
        done
        
        echo "=== Final artifacts ==="
        ls -la
        echo "=== Checksums file ==="
        cat checksums.txt
    
    - name: Create tag and release
      if: github.event_name != 'release'
      run: |
        # Auto-increment version number
        git fetch --tags
        
        # Get latest version tag or default to v0.1.0
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Latest tag: $LATEST_TAG"
        
        # Extract version numbers and increment
        if [[ "$LATEST_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
          MAJOR=${BASH_REMATCH[1]}
          MINOR=${BASH_REMATCH[2]}
          PATCH=${BASH_REMATCH[3]}
          
          # Increment patch version
          PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
        else
          # Fallback to v0.1.0 if no valid tag found
          NEW_VERSION="v0.1.0"
        fi
        
        echo "New version: $NEW_VERSION"
        echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
        
        # Create and push tag
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "$NEW_VERSION" -m "Release $NEW_VERSION"
        git push origin "$NEW_VERSION"
        echo "tag_name=$NEW_VERSION" >> $GITHUB_OUTPUT
      id: tag
    
    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/*.tar.gz
          artifacts/*.zip
          artifacts/checksums.txt
        tag_name: ${{ steps.tag.outputs.tag_name || github.ref_name }}
        name: "adbjson ${{ steps.tag.outputs.tag_name }}"
        body: |
          adbjson ${{ steps.tag.outputs.tag_name }} - Convert ADB output to clean JSON
          
          ## Install
          ```bash
          wget https://github.com/rajumark/adbjson/releases/download/${{ steps.tag.outputs.tag_name }}/adbjson_${{ steps.tag.outputs.tag_name }}_linux_amd64.tar.gz
          tar -xzf adbjson_${{ steps.tag.outputs.tag_name }}_linux_amd64.tar.gz
          sudo mv adbjson /usr/local/bin/
          ```
          
          ## Usage
          ```bash
          adbjson devices
          adbjson devices --l
          adbjson devices --raw
          ```
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_PAT_GO }}
