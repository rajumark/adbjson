name: Build and Release

on:
  push:
    branches: [ main, develop ]
  

permissions:
  contents: write

jobs:
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Check commit message for #go
      id: check
      run: |
        if [[ "${{ github.event_name }}" == "release" ]]; then
          echo "should-build=true" >> $GITHUB_OUTPUT
        else
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          if [[ "$COMMIT_MSG" == *"#go"* ]]; then
            echo "should-build=true" >> $GITHUB_OUTPUT
          else
            echo "should-build=false" >> $GITHUB_OUTPUT
          fi
        fi

  build:
    needs: check-commit
    if: needs.check-commit.outputs.should-build == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.21']
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    
    - name: Download platform-tools
      run: |
        mkdir -p platform-tools
        if [ "$RUNNER_OS" == "Linux" ]; then
          curl -L -o platform-tools.zip https://dl.google.com/android/repository/platform-tools-latest-linux.zip
          unzip -q platform-tools.zip -d platform-tools
          mv platform-tools/platform-tools platform-tools/platform-tools-linux
        elif [ "$RUNNER_OS" == "macOS" ]; then
          curl -L -o platform-tools.zip https://dl.google.com/android/repository/platform-tools-latest-darwin.zip
          unzip -q platform-tools.zip -d platform-tools
          mv platform-tools/platform-tools platform-tools/platform-tools-darwin
        else
          curl -L -o platform-tools.zip https://dl.google.com/android/repository/platform-tools-latest-windows.zip
          unzip -q platform-tools.zip -d platform-tools
          mv platform-tools/platform-tools platform-tools/platform-tools-windows
        fi
        rm platform-tools.zip
      shell: bash
    
    - name: Download Go dependencies
      run: go mod download
    
    - name: Verify dependencies
      run: go mod verify
    
    - name: Build
      run: |
        if [ "$RUNNER_OS" == "macOS" ]; then
          GOARCH=amd64 go build -v -o adbjson
        else
          go build -v -o adbjson${{ matrix.os == 'windows-latest' && '.exe' || '' }}
        fi
      shell: bash
    
    - name: Test (if Go is available)
      run: go test -v ./... || echo "No tests yet"
      continue-on-error: true
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: adbjson-${{ matrix.os }}
        path: |
          adbjson${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          platform-tools/
    
  release:
    needs: [check-commit, build]
    if: needs.check-commit.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Create release archives
      run: |
        cd artifacts
        for dir in adbjson-*; do
          cd "$dir"
          if [ -f "adbjson.exe" ]; then
            zip -r "../${dir}.zip" adbjson.exe platform-tools/
          else
            tar -czf "../${dir}.tar.gz" adbjson platform-tools/
          fi
          cd ..
        done
    
    - name: Create tag and release
      if: github.event_name != 'release'
      run: |
        TAG_NAME="v$(date +%Y%m%d-%H%M%S)"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a "$TAG_NAME" -m "Release $TAG_NAME"
        git push origin "$TAG_NAME"
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
      id: tag
    
    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/*.zip
          artifacts/*.tar.gz
        tag_name: ${{ steps.tag.outputs.tag_name || github.ref_name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_PAT_GO }}
